# Requires ACCESS_TOKEN secret: GitHub PAT with scopes repo + read:user
# Fetches language data from all owned repos (including private) and
# commits generated/languages.svg to this repo.

name: GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install requests

      - name: Generate language SVG
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python3 .github/scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          git diff --staged --quiet || git commit -m "chore: update language stats [skip ci]"
          git push
