# Requires ACCESS_TOKEN secret: GitHub PAT with scopes repo + read:user
# Rewrites the profile README.md between the GH_STATS markers with a
# text-based stats block (languages + activity metrics), including
# private-repo contributions via GraphQL.

name: GitHub Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install requests

      - name: Clean up legacy SVG artifacts (no-op after first run)
        run: rm -rf generated/

      - name: Generate stats block
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python3 .github/scripts/generate_stats.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update GitHub stats [skip ci]"
          git push
